<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAS Online</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #0a0e14;
  --bg2: #111820;
  --bg3: #1a2332;
  --surface: #1e293b;
  --border: #2a3a4e;
  --text: #e2e8f0;
  --text2: #8899aa;
  --accent: #38bdf8;
  --accent2: #0284c7;
  --accent-dim: rgba(56, 189, 248, .12);
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
  --shadow: rgba(0,0,0,.5);
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --glow: 0 0 20px rgba(56,189,248,.08);
}
[data-theme="light"] {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --bg3: #e2e8f0;
  --surface: #ffffff;
  --border: #cbd5e1;
  --text: #0f172a;
  --text2: #64748b;
  --accent: #0284c7;
  --accent2: #0369a1;
  --accent-dim: rgba(2, 132, 199, .08);
  --shadow: rgba(0,0,0,.08);
  --glow: none;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* ===== HEADER ===== */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -.3px;
}
header h1 i { color: var(--accent); filter: drop-shadow(0 0 6px rgba(56,189,248,.3)); }
header h1 span { font-weight: 300; color: var(--text2); font-size: 14px; }
.header-actions { display: flex; align-items: center; gap: 6px; }
.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .2s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
  font-weight: 500;
}
.btn-primary:hover { opacity: .85; background: var(--accent2); color: #fff; }
.btn-icon { padding: 8px 10px; }
.btn-accent {
  background: linear-gradient(135deg, #059669, #10b981);
  border-color: #059669;
  color: #fff;
  font-weight: 500;
}
.btn-accent:hover { opacity: .85; color: #fff; }
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 2px solid #10b981;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; color: #10b981;
  transition: all .2s;
}
.user-avatar:hover { border-color: var(--accent); color: var(--accent); }
.hidden { display: none !important; }
.upload-progress { width: 100%; height: 6px; background: var(--bg2); border-radius: 4px; overflow: hidden; margin: 16px 0 12px; }
.upload-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 4px; transition: width .3s; }
.upload-status p { margin: 4px 0; }
.upload-status .hint { font-size: 12px; color: var(--text2); }

/* ===== SEARCH + TOOLBAR ===== */
.search-row {
  padding: 16px 28px 0;
  display: flex;
  gap: 10px;
  align-items: center;
}
.search-wrapper {
  flex: 1;
  position: relative;
}
.search-wrapper i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text2);
  font-size: 14px;
  pointer-events: none;
}
.search-wrapper input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: .2s;
}
.search-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-wrapper input::placeholder { color: var(--text2); }

.toolbar {
  padding: 12px 28px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.toolbar-right { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }

.filter-group { display: flex; gap: 3px; background: var(--bg2); padding: 3px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.filter-btn {
  background: transparent;
  border: none;
  color: var(--text2);
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  transition: .15s;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 3px var(--shadow); }

.sort-group { display: flex; align-items: center; gap: 4px; }
.sort-group label { font-size: 12px; color: var(--text2); }
.sort-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  outline: none;
}
.sort-select:focus { border-color: var(--accent); }
.sort-dir-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: .15s;
}
.sort-dir-btn:hover { color: var(--text); border-color: var(--accent); }

.selection-bar {
  background: var(--accent2);
  color: #fff;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeIn .2s ease;
}
.selection-bar button {
  background: rgba(255,255,255,.15);
  border: none;
  color: #fff;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
}
.selection-bar button:hover { background: rgba(255,255,255,.25); }

/* ===== BREADCRUMB ===== */
.breadcrumb-bar {
  padding: 8px 28px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text2);
  flex-wrap: wrap;
  min-height: 36px;
}
.breadcrumb-bar .item {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.breadcrumb-bar .item:hover { background: var(--hover, var(--bg3)); color: var(--accent); }
.breadcrumb-bar .item.active { color: var(--text); font-weight: 500; cursor: default; }
.breadcrumb-bar .sep { color: var(--border); font-size: 12px; user-select: none; }

/* ===== VIEWPORT ===== */
#viewport {
  padding: 4px 28px 100px;
  transition: .2s;
}
#viewport.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
#viewport.list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* ===== FILE ITEMS ===== */
.file-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  user-select: none;
}
.file-item:hover {
  background: var(--bg2);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--glow);
}
.file-item:active { transform: translateY(0); }
.file-item.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.file-item.focused { outline: 2px solid var(--accent); outline-offset: 2px; }

#viewport.grid .file-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 6px;
  padding: 18px 12px 14px;
}
#viewport.grid .file-item .icon { font-size: 36px; margin-bottom: 2px; }
#viewport.grid .file-item .name {
  font-size: 13px;
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.3;
}
#viewport.grid .file-item .meta { display: none; }
#viewport.grid .file-item .badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
  font-weight: 500;
  text-transform: uppercase;
  font-family: var(--mono);
}
#viewport.grid .file-item .thumb {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  background: var(--bg3);
  margin-bottom: 4px;
}

#viewport.list .file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
}
#viewport.list .file-item .icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
#viewport.list .file-item .name { flex: 1; font-size: 14px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#viewport.list .file-item .name mark {
  background: rgba(251, 191, 36, .25);
  color: var(--warning);
  padding: 0 2px;
  border-radius: 2px;
}
#viewport.list .file-item .meta {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}
#viewport.list .file-item .meta span { white-space: nowrap; display: flex; align-items: center; gap: 4px; }
#viewport.list .file-item .badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
  font-weight: 500;
  text-transform: uppercase;
  font-family: var(--mono);
  flex-shrink: 0;
}
#viewport.list .file-item .thumb {
  width: 48px;
  height: 36px;
  object-fit: cover;
  border-radius: 4px;
  background: var(--bg3);
  flex-shrink: 0;
}

.file-item .check {
  position: absolute;
  top: 6px; left: 6px;
  width: 22px; height: 22px;
  border: 2px solid var(--text2);
  border-radius: 6px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: var(--surface);
  z-index: 2;
}
.file-item.selected .check { display: flex; background: var(--accent); border-color: var(--accent); color: #fff; }

/* Type colors */
.file-item.folder .icon { color: var(--warning); }
.file-item.image .icon { color: var(--success); }
.file-item.video .icon { color: #c084fc; }
.file-item.audio .icon { color: #fb923c; }
.file-item.pdf .icon { color: var(--danger); }
.file-item.code .icon { color: var(--accent); }
.file-item.archive .icon { color: #e879f9; }

/* ===== EMPTY STATES ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text2);
}
.empty-state i { font-size: 56px; margin-bottom: 16px; opacity: .4; }
.empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

/* ===== LOADING SKELETON ===== */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
.skeleton-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 12px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.skeleton-item .s-box {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  background: var(--bg3);
}
.skeleton-item .s-line {
  width: 80%;
  height: 14px;
  border-radius: 4px;
  background: var(--bg3);
}
.skeleton-item .s-line:last-child { width: 50%; }
.shimmer {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--surface) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== PREVIEW MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 92vw;
  max-height: 92vh;
  width: 100%;
  overflow: auto;
  position: relative;
  box-shadow: 0 24px 80px var(--shadow);
  animation: scaleIn .2s ease;
}
@keyframes scaleIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}
.modal-header h3 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 4px;
  transition: .15s;
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body { padding: 20px; }
.modal-body img { max-width: 100%; max-height: 75vh; display: block; margin: 0 auto; border-radius: 8px; }
.modal-body video, .modal-body audio { width: 100%; border-radius: 8px; }
.modal-body iframe { width: 100%; height: 75vh; border: none; border-radius: 8px; }
.modal-body pre {
  background: var(--bg2);
  padding: 20px;
  border-radius: 8px;
  overflow: auto;
  max-height: 65vh;
  font-size: 13px;
  line-height: 1.6;
  font-family: var(--mono);
}

/* ===== CONTEXT MENU ===== */
.context-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  min-width: 210px;
  z-index: 2000;
  box-shadow: 0 12px 48px var(--shadow), 0 0 0 1px rgba(255,255,255,.03);
  animation: menuIn .15s cubic-bezier(.22,1,.36,1);
  transform-origin: top left;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
@keyframes menuIn {
  from { transform: scale(.92) translateY(-4px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.context-menu .item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .1s;
  position: relative;
}
.context-menu .item:hover { background: var(--accent-dim); color: var(--accent); }
.context-menu .item i { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
.context-menu .item .shortcut {
  margin-left: auto;
  font-size: 11px;
  color: var(--text2);
  font-family: var(--mono);
  opacity: .6;
}
.context-menu .item.danger:hover { background: rgba(248,113,113,.12); color: var(--danger); }
.context-menu .item.disabled { opacity: .35; cursor: default; pointer-events: none; }
.context-menu .sep { border-top: 1px solid var(--border); margin: 4px 8px; padding: 0; cursor: default; }
.context-menu .sep:hover { background: none; }
.context-menu .label {
  padding: 4px 14px 2px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text2);
  font-weight: 600;
  opacity: .5;
}

/* ===== INFO PANEL (SIDEBAR) ===== */
.info-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 500;
  display: none;
}
.info-overlay.open { display: block; animation: fadeIn .2s ease; }
.info-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 380px;
  max-width: 90vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 501;
  transition: right .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -8px 0 32px var(--shadow);
}
.info-panel.open { right: 0; }
.info-panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.info-panel-header h3 { font-size: 16px; font-weight: 600; }
.info-panel-body { flex: 1; padding: 20px; overflow-y: auto; }
.info-panel-body .field { margin-bottom: 16px; }
.info-panel-body .field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text2);
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
}
.info-panel-body .field .value {
  font-size: 14px;
  word-break: break-word;
}
.info-panel-body .icon-preview {
  text-align: center;
  padding: 24px;
  margin-bottom: 16px;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.info-panel-body .icon-preview i { font-size: 56px; }
.info-panel-body .icon-preview img {
  max-width: 100%;
  max-height: 200px;
  border-radius: 8px;
}

/* ===== AI ASSISTANT ===== */
.ai-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(56,189,248,.35);
  z-index: 900;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  justify-content: center;
}
.ai-fab:hover { transform: scale(1.1) rotate(-5deg); box-shadow: 0 6px 28px rgba(56,189,248,.5); }
.ai-fab.active { transform: rotate(45deg); }
.ai-panel {
  position: fixed;
  bottom: 92px;
  right: 24px;
  width: 380px;
  max-height: 540px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 12px 48px var(--shadow);
  z-index: 899;
  display: none;
  flex-direction: column;
  overflow: hidden;
  animation: slideUp .25s ease;
}
.ai-panel.open { display: flex; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.ai-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, var(--accent-dim), transparent);
}
.ai-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.ai-header h3 i { color: var(--accent); }
.ai-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px; border-radius: 4px; }
.ai-close:hover { color: var(--text); }
.ai-body {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.ai-body .message {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 88%;
  animation: fadeIn .2s ease;
}

<script>
const CONFIG = {
  apiKey: 'AIzaSyAGloLcDRyDW62OW8INdwr-7rVfMJYUeg8',
  clientId: '952781470893-m8ndr82u3k8msvjcgl9cc9vqnce1lao6.apps.googleusercontent.com',
  rootFolder: '1AbXlMyDuzhOJZM7-uhlIy1as3J7OLI_A',
  aiProxyUrl: 'https://mg-nas-ai.unusual-cattle.workers.dev',
};

let accessToken = null;
let tokenClient = null;
let _renameFileId = null;

let currentFolder = CONFIG.rootFolder;
let folderStack = [];
let allFiles = [];
let currentFiles = [];
let currentFilter = 'all';
let viewMode = 'grid';
let selectedFiles = new Set();
let sortField = 'name';
let sortAsc = true;
let searchTerm = '';
let focusIndex = -1;
let lastClickedId = null;

// ===== LOADING =====
function showSkeleton() {
  const vp = document.getElementById('viewport');
  let html = '<div class="skeleton-grid">';
  for (let i = 0; i < 12; i++) {
    html += `<div class="skeleton-item"><div class="s-box shimmer"></div><div class="s-line shimmer"></div><div class="s-line shimmer"></div></div>`;
  }
  html += '</div>';
  vp.innerHTML = html;
}

async function loadFolder(folderId) {
  showSkeleton();
  currentFolder = folderId;
  try {
    const q = `'${folderId}' in parents and trashed=false`;
    const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType,size,modifiedTime,createdTime,thumbnailLink,iconLink,webViewLink,fileExtension)&pageSize=1000&orderBy=folder,name_natural&key=${CONFIG.apiKey}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API Error ${resp.status}`);
    const data = await resp.json();
    allFiles = data.files || [];
    focusIndex = -1;
    applyFilters();
    updateBreadcrumb(folderId);
    updateStats();
  } catch(e) {
    document.getElementById('viewport').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i>
        <h3>Error al cargar</h3>
        <p>${e.message}. Verifica la API key y los permisos de la carpeta.</p>
      </div>`;
    showToast('Error: ' + e.message, 'error');
  }
}

// ===== FILTER + SEARCH + SORT =====
function applyFilters() {
  let filtered = [...allFiles];
  if (currentFilter !== 'all')
    filtered = filtered.filter(f => getFileType(f) === currentFilter);
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  if (searchTerm)
    filtered = filtered.filter(f => f.name.toLowerCase().includes(searchTerm));
  currentFiles = filtered;
  applySort();
}

function applySort() {
  sortField = document.getElementById('sortSelect').value;
  let sorted = [...currentFiles];
  sorted.sort((a, b) => {
    let va, vb;
    if (sortField === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    else if (sortField === 'size') { va = parseInt(a.size) || 0; vb = parseInt(b.size) || 0; }
    else if (sortField === 'type') { va = getFileType(a); vb = getFileType(b); }
    else { va = a.modifiedTime || ''; vb = b.modifiedTime || ''; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  currentFiles = sorted;
  renderFiles(sorted);
}

function toggleSortDir() {
  sortAsc = !sortAsc;
  document.getElementById('sortDirBtn').innerHTML = sortAsc ? '<i class="fas fa-arrow-up-wide-short"></i>' : '<i class="fas fa-arrow-down-short-wide"></i>';
  applySort();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  applyFilters();
}

let searchTimeout;
function handleSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => applyFilters(), 250);
}

function highlightText(text, term) {
  if (!term) return text;
  const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ===== RENDER =====
function getFileType(file) {
  const mime = file.mimeType;
  if (mime === 'application/vnd.google-apps.folder') return 'folder';
  if (mime.startsWith('image/')) return 'image';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime === 'application/pdf' || mime.includes('document') || mime.includes('spreadsheet') || mime.includes('presentation')) return 'pdf';
  if (['text/', 'application/json', 'application/javascript', 'text/html', 'text/css', 'text/x-python', 'text/x-java', 'text/x-c', 'text/x-rust', 'text/markdown', 'application/xml'].some(t => mime.startsWith(t) || mime === t) || /\.(js|ts|py|java|c|cpp|h|rs|go|rb|php|sh|bash|yaml|yml|toml|json|xml|html|css|scss|less|md|sql|r|lua|swift|kt|dart)$/i.test(file.name)) return 'code';
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('tar') || mime.includes('gzip') || mime.includes('compress') || /\.(zip|rar|tar|gz|7z|bz2)$/i.test(file.name)) return 'archive';
  return 'other';
}

function getFileIcon(file) {
  const map = { folder: 'fa-folder', image: 'fa-file-image', video: 'fa-file-video', audio: 'fa-file-audio', pdf: 'fa-file-pdf', code: 'fa-file-code', archive: 'fa-file-archive', other: 'fa-file' };
  return map[getFileType(file)] || 'fa-file';
}

function getExtension(file) {
  return (file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : '');
}

function formatSize(bytes) {
  if (!bytes) return '';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0; let s = parseInt(bytes);
  while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; }
  return (i > 0 ? s.toFixed(1) : s.toFixed(0)) + ' ' + u[i];
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderFiles(files) {
  const vp = document.getElementById('viewport');
  if (!files.length) {
    const isSearch = searchTerm.length > 0;
    vp.innerHTML = isSearch
      ? `<div class="empty-state"><i class="fas fa-search-minus"></i><h3>Sin resultados</h3><p>No se encontraron archivos que coincidan con "${searchTerm}"</p></div>`
      : `<div class="empty-state"><i class="fas fa-folder-open"></i><h3>Carpeta vacía</h3><p>No hay archivos aquí. Usa el botón "Subir" para agregar contenido.</p></div>`;
    return;
  }
  vp.innerHTML = files.map((f, idx) => {
    const type = getFileType(f);
    const icon = getFileIcon(f);
    const ext = getExtension(f);
    const thumb = f.thumbnailLink || (type === 'image' ? `https://lh3.googleusercontent.com/d/${f.id}=w400` : '');
    const sel = selectedFiles.has(f.id) ? 'selected' : '';
    const nameHtml = viewMode === 'list' ? highlightText(f.name, searchTerm) : f.name;
    return `<div class="file-item ${type} ${sel}" data-id="${f.id}" data-index="${idx}" tabindex="0"
      onclick="handleClick(event,'${f.id}',${idx})"
      ondblclick="handleDblClick('${f.id}')"
      oncontextmenu="showContextMenu(event,'${f.id}')">
      <div class="check"><i class="fas fa-check"></i></div>
      ${ext && type !== 'folder' && viewMode === 'grid' ? `<span class="badge">${ext}</span>` : ''}
      ${thumb ? `<img class="thumb" src="${thumb}" loading="lazy" alt="">` : `<div class="icon"><i class="fas ${icon}"></i></div>`}
      <div class="name">${nameHtml}</div>
      <div class="meta">
        <span>${formatSize(f.size)}</span>
        <span>${formatDate(f.modifiedTime)}</span>
      </div>
      ${viewMode === 'list' && ext && type !== 'folder' ? `<span class="badge">${ext}</span>` : ''}
    </div>`;
  }).join('');
}

// ===== SELECTION =====
function handleClick(e, id, idx) {
  if (window.getSelection().toString()) return;
  const ctrl = e.ctrlKey || e.metaKey;
  const shift = e.shiftKey;

  if (shift && lastClickedId) {
    const items = currentFiles;
    const lastIdx = items.findIndex(f => f.id === lastClickedId);
    if (lastIdx > -1) {
      const from = Math.min(lastIdx, idx);
      const to = Math.max(lastIdx, idx);
      clearSelection();
      for (let i = from; i <= to; i++) {
        selectedFiles.add(items[i].id);
      }
      renderFiles(currentFiles);
      updateSelectionBar();
    }
    return;
  }

  if (ctrl) {
    if (selectedFiles.has(id)) { selectedFiles.delete(id); }
    else { selectedFiles.add(id); }
    const el = document.querySelector(`.file-item[data-id="${id}"]`);
    if (el) el.classList.toggle('selected');
    updateSelectionBar();
    return;
  }

  if (selectedFiles.size > 0) {
    clearSelection();
  }
  lastClickedId = id;
  focusIndex = idx;
}

function handleDblClick(id) {
  const file = allFiles.find(f => f.id === id);
  if (!file) return;
  clearSelection();
  if (getFileType(file) === 'folder') {
    if (folderStack[folderStack.length - 1] !== currentFolder) folderStack.push(currentFolder);
    loadFolder(id);
  } else {
    previewFile(file);
  }
}

function updateSelectionBar() {
  const bar = document.getElementById('selectionBar');
  const count = document.getElementById('selCount');
  if (selectedFiles.size > 0) {
    bar.classList.remove('hidden');
    count.textContent = selectedFiles.size + ' seleccionado' + (selectedFiles.size > 1 ? 's' : '');
  } else {
    bar.classList.add('hidden');
  }
}

function clearSelection() {
  selectedFiles.clear();
  document.querySelectorAll('.file-item.selected').forEach(el => el.classList.remove('selected'));
  updateSelectionBar();
}

function downloadSelected() {
  if (selectedFiles.size === 0) return;
  showToast('Abriendo archivos seleccionados...', 'info');
  selectedFiles.forEach(id => {
    window.open(`https://www.googleapis.com/drive/v3/files/${id}?alt=media&key=${CONFIG.apiKey}`, '_blank');
  });
}

// ===== BREADCRUMB =====
async function updateBreadcrumb(folderId) {
  const bc = document.getElementById('breadcrumb');
  const parts = [{ id: CONFIG.rootFolder, name: 'NAS', icon: 'fa-server' }];
  try {
    if (folderId !== CONFIG.rootFolder) {
      let current = folderId;
      const chain = [];
      while (current && current !== CONFIG.rootFolder) {
        const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${current}?fields=id,name,parents&key=${CONFIG.apiKey}`);
        if (!resp.ok) break;
        const data = await resp.json();
        chain.unshift({ id: data.id, name: data.name });
        current = data.parents ? data.parents[0] : null;
      }
      parts.push(...chain);
    }
  } catch(_) {}
  bc.innerHTML = parts.map((p, i) => {
    const isLast = i === parts.length - 1;
    const sep = i > 0 ? '<span class="sep">›</span>' : '';
    return sep + (isLast
      ? `<span class="item active"><i class="fas fa-folder-open" style="color:var(--warning)"></i> ${p.name}</span>`
      : `<span class="item" onclick="navigateTo('${p.id}')">${i === 0 ? `<i class="fas ${p.icon || 'fa-folder'}"></i>` : ''} ${p.name}</span>`);
  }).join('');
}

function navigateTo(id) {
  if (id === currentFolder) return;
  folderStack = [];
  loadFolder(id);
}

// ===== PREVIEW =====
async function previewFile(file) {
  const type = getFileType(file);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); } });

  let body = '';
  if (type === 'image') {
    body = `<img src="https://lh3.googleusercontent.com/d/${file.id}=w1600" alt="${file.name}">`;
  } else if (type === 'video') {
    body = `<video controls autoplay><source src="https://www.googleapis.com/drive/v3/files/${file.id}?alt=media${accessToken ? '' : '&key=' + CONFIG.apiKey}"></video>`;
  } else if (type === 'audio') {
    body = `<audio controls autoplay><source src="https://www.googleapis.com/drive/v3/files/${file.id}?alt=media${accessToken ? '' : '&key=' + CONFIG.apiKey}"></audio>`;
  } else if (type === 'pdf' || file.mimeType.includes('document') || file.mimeType.includes('spreadsheet') || file.mimeType.includes('presentation')) {
    body = `<iframe src="https://drive.google.com/file/d/${file.id}/preview" allowfullscreen></iframe>`;
  } else if (type === 'code') {
    try {
      let url = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`;
      const opts = {};
      if (accessToken) opts.headers = { Authorization: 'Bearer ' + accessToken };
      else url += '&key=' + CONFIG.apiKey;
      const resp = await fetch(url, opts);
      const text = await resp.text();
      body = `<pre>${escapeHtml(text)}</pre>`;
    } catch { body = '<p style="color:var(--danger);padding:20px">Error al cargar el contenido.</p>'; }
  } else {
    body = `<div style="text-align:center;padding:60px 20px;color:var(--text2)">
      <i class="fas fa-file" style="font-size:48px;margin-bottom:16px;opacity:.4;display:block"></i>
      <p>Vista previa no disponible</p>
      <a href="${file.webViewLink || `https://drive.google.com/file/d/${file.id}/view`}" target="_blank" class="btn" style="display:inline-flex;margin-top:16px">
        <i class="fas fa-external-link-alt"></i> Abrir en Drive
      </a>
    </div>`;
  }

  overlay.innerHTML = `<div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas ${getFileIcon(file)}" style="color:var(--accent)"></i> ${file.name}</h3>
      <div style="display:flex;gap:6px">
        <button class="modal-close" onclick="downloadFile('${file.id}')" title="Descargar"><i class="fas fa-download"></i></button>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="modal-body">${body}</div>
  </div>`;
  document.body.appendChild(overlay);
}

// ===== CONTEXT MENU =====
let _ctxListener = null;

function buildMenu(items, x, y) {
  closeContextMenu();
  const menu = document.createElement('div');
  menu.className = 'context-menu';
  const pw = window.innerWidth, ph = window.innerHeight;
  const mw = 220, mh = items.length * 36 + 24;
  const lx = Math.max(4, Math.min(x, pw - mw));
  const ly = Math.max(4, Math.min(y, ph - mh));
  menu.style.left = lx + 'px';
  menu.style.top = ly + 'px';
  menu.style.transformOrigin = (lx < x ? 'top left' : 'top right');
  menu.innerHTML = items.map(it => {
    if (it === null) return '<div class="sep"></div>';
    const cls = 'item' + (it.danger ? ' danger' : '') + (it.disabled ? ' disabled' : '');
    const sc = it.shortcut ? `<span class="shortcut">${it.shortcut}</span>` : '';
    return `<div class="${cls}" data-action="${it.action || ''}"><i class="fas ${it.icon}"></i> ${it.text}${sc}</div>`;
  }).join('');
  document.body.appendChild(menu);
  menu.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action = el.dataset.action;
      closeContextMenu();
      if (action) new Function(action)();
    });
  });
  _ctxListener = e => {
    if (!e.target.closest('.context-menu')) closeContextMenu();
  };
  setTimeout(() => document.addEventListener('click', _ctxListener), 0);
}

function showContextMenu(e, id) {
  e.preventDefault();
  const file = allFiles.find(f => f.id === id);
  if (!file) return;
  const type = getFileType(file);
  const isFolder = type === 'folder';
  const items = [
    { icon: 'fa-download', text: 'Descargar', action: `downloadFile('${id}')`, shortcut: 'Enter' },
    ...(isFolder ? [] : [{ icon: 'fa-eye', text: 'Vista previa', action: `previewFile(allFiles.find(f=>f.id==='${id}'))`, shortcut: '' }]),
    { icon: 'fa-link', text: 'Copiar enlace', action: `copyLink('${id}')`, shortcut: 'Ctrl+C' },
    null,
    { icon: 'fa-info-circle', text: 'Ver información', action: `toggleInfoPanel(allFiles.find(f=>f.id==='${id}'))`, shortcut: 'Ctrl+I' },
    { icon: 'fa-external-link-alt', text: 'Abrir en Drive', action: `window.open('${file.webViewLink || 'https://drive.google.com/file/d/'+id+'/view'}','_blank')` },
    null,
    { icon: 'fa-check-double', text: 'Seleccionar todo', action: `selectAllFiles()`, shortcut: 'Ctrl+A' },
    { icon: 'fa-i-cursor', text: 'Renombrar', action: `openRename('${id}')` },
    { icon: 'fa-trash', text: 'Eliminar', action: `deleteFile('${id}')`, danger: true },
  ];
  buildMenu(items, e.clientX, e.clientY);
}

function showViewportMenu(e) {
  e.preventDefault();
  const multi = selectedFiles.size > 0;
  const items = [
    { icon: 'fa-sync-alt', text: 'Refrescar', action: `loadFolder(currentFolder)`, shortcut: 'F5' },
    { icon: 'fa-check-double', text: 'Seleccionar todo', action: `selectAllFiles()`, shortcut: 'Ctrl+A' },
    ...(multi ? [{ icon: 'fa-times', text: 'Deseleccionar todo', action: `clearSelection()`, shortcut: 'Esc' }] : []),
    null,
    { icon: 'fa-upload', text: 'Subir archivo', action: `openUpload()` },
    { icon: 'fa-folder-plus', text: 'Nueva carpeta', action: `openNewFolder()` },
    ...(multi ? [
      null,
      { icon: 'fa-download', text: `Descargar (${selectedFiles.size})`, action: `downloadSelected()` },
    ] : []),
  ];
  buildMenu(items, e.clientX, e.clientY);
}

function closeContextMenu() {
  document.querySelectorAll('.context-menu').forEach(el => el.remove());
  if (_ctxListener) { document.removeEventListener('click', _ctxListener); _ctxListener = null; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeContextMenu();
});

function selectAllFiles() {
  selectedFiles.clear();
  currentFiles.forEach(f => selectedFiles.add(f.id));
  applySelection();
  showToast(`${selectedFiles.size} archivo(s) seleccionado(s)`);
}

function clearSelection() {
  selectedFiles.clear();

}

function downloadFile(id) {
  const url = `https://www.googleapis.com/drive/v3/files/${id}?alt=media${accessToken ? '' : '&key=' + CONFIG.apiKey}`;
  if (accessToken) {
    const a = document.createElement('a');
    a.href = url;

    a.click();

    window.open(url, '_blank');
  }

    showToast('Enlace copiado', 'success');
  } catch { showToast('No se pudo copiar', 'error'); }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key.startsWith('F') || e.ctrlKey || e.metaKey) {
    if (e.ctrlKey && (e.key === 'a' || e.key === 'A')) {
      e.preventDefault();
      if (currentFiles.length) {
        currentFiles.forEach(f => selectedFiles.add(f.id));
        renderFiles(currentFiles);
        updateSelectionBar();
        showToast(selectedFiles.size + ' seleccionados', 'info');
      }
      return;
    }
    if (e.key === 'F1') {
      e.preventDefault();
      document.getElementById('kbHint').classList.toggle('visible');
      return;
    }
    return;
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (!currentFiles.length) return;
    if (focusIndex < 0) focusIndex = 0;
    else focusIndex = e.key === 'ArrowDown' ? Math.min(focusIndex + 1, currentFiles.length - 1) : Math.max(focusIndex - 1, 0);
    const id = currentFiles[focusIndex].id;
    document.querySelectorAll('.file-item.focused').forEach(el => el.classList.remove('focused'));
    const el = document.querySelector(`.file-item[data-id="${id}"]`);
    if (el) { el.classList.add('focused'); el.scrollIntoView({ block: 'nearest' }); }
    lastClickedId = id;
  }
  if (e.key === 'Enter' && lastClickedId) {
    e.preventDefault();
    const file = allFiles.find(f => f.id === lastClickedId);
    if (file) handleDblClick(lastClickedId);
  }
  if (e.key === 'Delete' && lastClickedId && selectedFiles.size > 0) {
    e.preventDefault();
    deleteSelected();
  }
  if (e.key === 'Delete' && lastClickedId && selectedFiles.size === 0) {
    e.preventDefault();
    deleteFile(lastClickedId);
  }
});

// ===== AI ASSISTANT (Cloudflare Workers AI) =====
const AI_MODEL = () => document.getElementById('aiModelSelect')?.value || 'mistral-small';
const AI_TEMP = 0.0;
const AI_MAX_TOKENS = 8000;
let aiMessages = [];

function toggleAI() {
  const panel = document.getElementById('aiPanel');
  const fab = document.getElementById('aiFab');
  panel.classList.toggle('open');
  fab.classList.toggle('active');
  if (panel.classList.contains('open')) {
    document.getElementById('aiInput').focus();
    updateAIContext();
  }
}

function updateAIContext() {
  const body = document.getElementById('aiBody');
  let ctx = body.querySelector('.context-info');
  if (!ctx) {
    ctx = document.createElement('div');
    ctx.className = 'context-info';
    body.insertBefore(ctx, body.querySelector('.ai-loading'));
  }
  const totalFiles = allFiles.length;
  const folders = allFiles.filter(f => getFileType(f) === 'folder').length;
  const images = allFiles.filter(f => getFileType(f) === 'image').length;
  const videos = allFiles.filter(f => getFileType(f) === 'video').length;
  const totalSize = allFiles.reduce((s, f) => s + (parseInt(f.size) || 0), 0);
  ctx.innerHTML = `
    <span><i class="fas fa-folder"></i> ${folders} carpetas · ${totalFiles - folders} archivos</span>
    <span><i class="fas fa-image"></i> ${images} imágenes · <i class="fas fa-video"></i> ${videos} videos</span>
    <span><i class="fas fa-database"></i> ${formatSize(totalSize)} total · ${totalFiles} elementos</span>
  `;
}

function buildSystemPrompt() {
  const folders = allFiles.filter(f => getFileType(f) === 'folder').length;
  const total = allFiles.length;
  const files = allFiles.slice(0, 100);
  let fileList = files.map(f => `${f.name} (${f.mimeType || 'desconocido'}, ${formatSize(parseInt(f.size) || 0)})`).join('\n');
  if (allFiles.length > 100) fileList += `\n... y ${allFiles.length - 100} más`;
  return `Eres un asistente de IA integrado en un NAS (gestor de archivos en Google Drive).

CONTEXTO ACTUAL DE LA CARPETA:
- Elementos totales: ${total} (${folders} carpetas, ${total - folders} archivos)
- Carpeta actual ID: ${currentFolder}

LISTA DE ARCHIVOS (hay ${total} en total, mostrando hasta 100):
${fileList}

INSTRUCCIONES:
- Responde SIEMPRE en español, de forma amable y concisa (máximo 3 párrafos).
- Usa la información real de los archivos listados arriba para responder.
- Si te preguntan por archivos que no están en la lista, dilo honestamente.
- Puedes ayudar con: conteo de archivos, búsqueda por nombre, información sobre tipos/formatos, organización, sugerencias.
- NO inventes respuestas sobre archivos que no ves en la lista.
- Si te piden acciones (renombrar, eliminar, etc.), indícale al usuario que las haga desde el menú contextual.`;
}

function addAIMessage(text, role) {
  const body = document.getElementById('aiBody');
  const d = document.createElement('div');
  d.className = 'message ' + (role === 'user' ? 'user' : 'bot');
  d.textContent = text;
  body.insertBefore(d, body.querySelector('.ai-loading'));
  body.scrollTop = body.scrollHeight;
}

function showAILoading(show) {
  const el = document.getElementById('aiLoading');
  el.classList.toggle('show', show);
}

async function sendAIMessage() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if (!text) return;
  if (!CONFIG.aiProxyUrl) {
    showToast('No hay URL de proxy configurada. Revisa CONFIG.aiProxyUrl', 'error');
    return;
  }

  input.value = '';
  addAIMessage(text, 'user');
  aiMessages.push({ role: 'user', content: text });

  const lower = text.toLowerCase();
  if (lower === 'hola' || lower === 'buenas' || lower === 'hey') {
    addAIMessage('¡Hola! ¿En qué puedo ayudarte con tus archivos?', 'bot');
    return;
  }

  showAILoading(true);
  try {
    const system = buildSystemPrompt();
    const resp = await fetch(CONFIG.aiProxyUrl, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        model: AI_MODEL(),
        max_tokens: AI_MAX_TOKENS,
        temperature: AI_TEMP,
        system: system,
        messages: aiMessages
      })
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API error ${resp.status}: ${err}`);
    }
    const data = await resp.json();
    const reply = data.content[0].text;
    addAIMessage(reply, 'bot');
    aiMessages.push({ role: 'assistant', content: reply });
    if (aiMessages.length > 20) aiMessages.splice(0, 2);
  } catch (e) {
    console.error('Claude API error:', e);
    addAIMessage('Error al contactar con la IA. Intenta de nuevo.', 'bot');
  }
  showAILoading(false);
}

function aiAction(action) {
  const prompts = {
    files: '¿Cuántos archivos y carpetas hay en esta carpeta? Dame un resumen detallado.',
    help: '¿Qué puedo hacer con este NAS? Dame una lista de las funciones principales.',
    search: '¿Cómo puedo buscar archivos en el NAS?',
    keys: '¿Qué atajos de teclado están disponibles en el NAS?'
  };
  document.getElementById('aiInput').value = prompts[action] || '';
  sendAIMessage();
}

// ===== UTILITIES =====
function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
  t.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 300); }, 3200);
}

// ===== AUTH =====
async function initAuth() {
  if (typeof google === 'undefined' || !google.accounts) {
    let waited = 0;
    while (waited < 10000) {
      if (typeof google !== 'undefined' && google.accounts) break;
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (typeof google === 'undefined' || !google.accounts) {
      console.warn('GIS library failed to load');
      return;
    }
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.clientId,
    scope: 'https://www.googleapis.com/auth/drive',
    callback: tokenResponse => {
      if (tokenResponse.access_token) {
        accessToken = tokenResponse.access_token;
        onAuthSuccess();
      } else if (tokenResponse.error) {
        showToast('Error de autenticación: ' + tokenResponse.error, 'error');
      }
    },
  });
  // Try restoring a previously stored token
  const saved = localStorage.getItem('nas-token');
  if (saved) {
    try {
      const tok = JSON.parse(saved);
      const age = Date.now() - tok.time;
      if (age < 3000000) { // ~35 minutes (tokens last ~60 min)
        accessToken = tok.token;
        onAuthSuccess();
        return;
      }
    } catch(_) {}
    localStorage.removeItem('nas-token');
  }
}

function handleAuth() {
  if (!tokenClient) { showToast('Cargando autenticación...', 'info'); return; }
  if (isAuthenticated()) { showToast('Ya has iniciado sesión', 'info'); return; }
  tokenClient.requestAccessToken();
}

function handleSignout() {
  if (accessToken && google.accounts) {
    google.accounts.oauth2.revoke(accessToken, () => {});
  }
  accessToken = null;
  localStorage.removeItem('nas-token');
  document.getElementById('loginBtn').classList.remove('hidden');
  document.getElementById('userAvatar').classList.add('hidden');
  document.getElementById('uploadBtn').classList.add('hidden');
  showToast('Sesión cerrada', 'info');
}

function onAuthSuccess() {
  localStorage.setItem('nas-token', JSON.stringify({ token: accessToken, time: Date.now() }));
  document.getElementById('loginBtn').classList.add('hidden');
  document.getElementById('userAvatar').classList.remove('hidden');
  document.getElementById('uploadBtn').classList.remove('hidden');
  showToast('Sesión iniciada ✓', 'success');
}

function isAuthenticated() { return !!accessToken; }

function ensureAuth() {
  if (!isAuthenticated()) {
    showToast('Necesitas iniciar sesión para esta acción', 'error');
    handleAuth();
    return false;
  }
  // Refresh token if stored
  const saved = localStorage.getItem('nas-token');
  if (saved) {
    try {
      const tok = JSON.parse(saved);
      if (Date.now() - tok.time > 3000000) { // ~35 min
        localStorage.removeItem('nas-token');
      }
    } catch(_) {}
  }
  return true;
}

function getAuthHeaders() {
  const h = {};
  if (accessToken) h['Authorization'] = 'Bearer ' + accessToken;
  return h;
}

// ===== RENAME =====
function openRename(id) {
  if (!ensureAuth()) return;
  const file = allFiles.find(f => f.id === id);
  if (!file) return;
  _renameFileId = id;
  document.getElementById('renameInput').value = file.name;
  document.getElementById('renameModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('renameInput').select(), 100);
}

function closeRenameModal() {
  document.getElementById('renameModal').classList.add('hidden');
  _renameFileId = null;
}

async function confirmRename() {
  if (!ensureAuth()) return;
  const newName = document.getElementById('renameInput').value.trim();
  if (!newName || !_renameFileId) return;
  const id = _renameFileId;
  closeRenameModal();
  try {
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
      body: JSON.stringify({ name: newName }),
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || 'Error al renombrar'); }
    showToast('Renombrado correctamente', 'success');
    await loadFolder(currentFolder);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ===== DELETE =====
async function deleteFile(id) {
  if (!ensureAuth()) return;
  const file = allFiles.find(f => f.id === id);
  if (!file) return;
  if (!confirm(`¿Eliminar "${file.name}"?\nSe moverá a la papelera de Google Drive.`)) return;
  try {
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, {
      method: 'DELETE',
      headers: getAuthHeaders(),
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || 'Error al eliminar'); }
    showToast('Eliminado correctamente', 'success');
    selectedFiles.delete(id);
    await loadFolder(currentFolder);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function deleteSelected() {
  if (!ensureAuth() || selectedFiles.size === 0) return;
  if (!confirm(`¿Eliminar ${selectedFiles.size} archivo(s)? Se moverán a la papelera.`)) return;
  const ids = [...selectedFiles];
  let ok = 0, fail = 0;
  for (const id of ids) {
    try {
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, {
        method: 'DELETE',
        headers: getAuthHeaders(),
      });
      if (resp.ok) ok++; else fail++;
    } catch { fail++; }
  }
  clearSelection();
  await loadFolder(currentFolder);
  showToast(`${ok} eliminado(s)` + (fail ? `, ${fail} error(es)` : ''), fail ? 'error' : 'success');
}

// ===== NEW FOLDER =====
function openNewFolder() {
  if (!ensureAuth()) return;
  document.getElementById('newFolderInput').value = '';
  document.getElementById('newFolderModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('newFolderInput').focus(), 100);
}

function closeNewFolderModal() {
  document.getElementById('newFolderModal').classList.add('hidden');
}

async function confirmNewFolder() {
  if (!ensureAuth()) return;
  const name = document.getElementById('newFolderInput').value.trim();
  if (!name) return;
  closeNewFolderModal();
  try {
    const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
      body: JSON.stringify({
        name,
        mimeType: 'application/vnd.google-apps.folder',
        parents: [currentFolder],
      }),
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || 'Error al crear carpeta'); }
    showToast('Carpeta creada', 'success');
    await loadFolder(currentFolder);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ===== UPLOAD =====
function openUpload() {
  if (!ensureAuth()) return;
  document.getElementById('fileInput').click();
}

function handleFileSelect(e) {
  const files = e.target.files;
  if (!files.length) return;
  e.target.value = '';
  uploadFiles(files);
}

async function uploadFiles(files) {
  if (!ensureAuth()) return;
  const modal = document.getElementById('uploadModal');
  const bar = document.getElementById('uploadProgressBar');
  const nameEl = document.getElementById('uploadFileName');
  const infoEl = document.getElementById('uploadFileInfo');
  modal.classList.remove('hidden');

  let ok = 0, fail = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    nameEl.textContent = `(${i + 1}/${files.length}) ${file.name}`;
    infoEl.textContent = formatSize(file.size);
    bar.style.width = '0%';

    try {
      const metadata = JSON.stringify({
        name: file.name,
        parents: [currentFolder],
      });
      const form = new FormData();
      form.append('metadata', new Blob([metadata], { type: 'application/json' }));
      form.append('file', file);

      const xhr = new XMLHttpRequest();
      const p = new Promise((resolve, reject) => {
        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) bar.style.width = Math.round((e.loaded / e.total) * 90) + '%';
        });
        xhr.addEventListener('load', () => {
          if (xhr.status >= 200 && xhr.status < 300) resolve(); else reject(new Error('Error ' + xhr.status));
        });
        xhr.addEventListener('error', () => reject(new Error('Error de red')));
        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
        xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
        xhr.send(form);
      });
      await p;
      bar.style.width = '100%';
      ok++;
    } catch(e) {
      fail++;
      infoEl.textContent = 'Error: ' + e.message;
    }
  }

  setTimeout(() => { modal.classList.add('hidden'); }, 800);
  await loadFolder(currentFolder);
  showToast(`${ok} subido(s)` + (fail ? `, ${fail} error(es)` : ''), fail ? 'error' : 'success');
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.add('hidden');
}

// ===== DOWNLOAD SELECTED =====
async function downloadSelected() {
  if (selectedFiles.size === 0) return;
  const ids = [...selectedFiles];
  if (ids.length === 1) {
    const f = allFiles.find(x => x.id === ids[0]);
    if (f && getFileType(f) === 'folder') { showToast('No se pueden descargar carpetas directamente', 'info'); return; }
    const url = `https://www.googleapis.com/drive/v3/files/${ids[0]}?alt=media${accessToken ? '' : '&key=' + CONFIG.apiKey}`;
    window.open(url, '_blank');
    return;
  }
  showToast('Abre cada archivo individualmente', 'info');
}

// ===== RECENT FILES (localStorage) =====
function addRecent(file) {
  try {
    let recent = JSON.parse(localStorage.getItem('nas-recent') || '[]');
    recent = recent.filter(r => r.id !== file.id);
    recent.unshift({ id: file.id, name: file.name, time: Date.now() });
    if (recent.length > 20) recent = recent.slice(0, 20);
    localStorage.setItem('nas-recent', JSON.stringify(recent));
  } catch(_) {}
}

  document.getElementById('viewport').addEventListener('contextmenu', e => {
